<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ML Prediction Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            font-family: Arial;
        }

        .card {
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
        }

        .form-control {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
        }

        .btn-custom {
            background: linear-gradient(45deg, #3b82f6, #06b6d4);
            border: none;
            color: white;
            font-weight: bold;
        }

        .result-box {
            background: #0ea5e9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card">

        <h2 class="text-center">🚀 ML Prediction Dashboard</h2>

        <form method="POST" class="mt-3">

            <!-- 🔥 19 INPUT FIELDS -->
            {% for i in range(1,20) %}
            <input type="text" name="f{{i}}" class="form-control mb-2" placeholder="Feature {{i}}">
            {% endfor %}

            <button class="btn btn-custom w-100">Predict</button>
        </form>

        {% if result is not none %}
        <div class="result-box">
            <h4>Prediction: {{ result }}</h4>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
