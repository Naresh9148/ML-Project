<!DOCTYPE html>
<html>
<head>
<title>Credit Risk Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: white;
}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
}
input, select {
    background: #0f172a !important;
    color: white !important;
    border: 1px solid #334155 !important;
}
.btn-custom {
    background: linear-gradient(45deg,#3b82f6,#06b6d4);
    border: none;
    color: white;
}
.result {
    background: #22c55e;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container mt-5">
<div class="card">

<h2 class="text-center">🚀 Credit Risk Prediction</h2>

<form method="POST">

<!-- 🏠 HOME OWNERSHIP -->
<label>Home Ownership</label>
<select name="home" class="form-control mb-3">
<option value="RENT">Rent</option>
<option value="OWN">Own</option>
<option value="MORTGAGE">Mortgage</option>
<option value="OTHER">Other</option>
</select>

<!-- 📌 LOAN INTENT -->
<label>Loan Purpose</label>
<select name="intent" class="form-control mb-3">
<option value="PERSONAL">Personal</option>
<option value="EDUCATION">Education</option>
<option value="MEDICAL">Medical</option>
<option value="VENTURE">Venture</option>
<option value="HOMEIMPROVEMENT">Home Improvement</option>
<option value="DEBTCONSOLIDATION">Debt Consolidation</option>
</select>

<!-- 📊 DETAILS -->
<input name="loan_grade" class="form-control mb-2" placeholder="Loan Grade">
<select name="default" class="form-control mb-2">
<option>No</option>
<option>Yes</option>
</select>
<input name="emp_length" class="form-control mb-2" placeholder="Employment Length">
<input name="loan_percent_income" class="form-control mb-2" placeholder="Loan % Income">
<input name="credit_hist" class="form-control mb-2" placeholder="Credit History Length">

<input name="age" class="form-control mb-2" placeholder="Age">
<input name="income" class="form-control mb-2" placeholder="Income">
<input name="loan_amount" class="form-control mb-2" placeholder="Loan Amount">
<input name="interest" class="form-control mb-2" placeholder="Interest Rate">

<button class="btn btn-custom w-100 mt-3">Predict</button>

</form>

{% if result %}
<div class="result">
<h4>{{ result }}</h4>
</div>
{% endif %}

</div>
</div>

</body>
</html>
