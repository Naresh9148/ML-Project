<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Credit Risk Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'Segoe UI';
}

.container-box {
    max-width: 900px;
    margin: auto;
    margin-top: 30px;
}

.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0px 10px 40px rgba(0,0,0,0.6);
}

input {
    background: #0f172a !important;
    border: 1px solid #334155 !important;
    color: white !important;
}

input::placeholder {
    color: #94a3b8;
}

.section {
    margin-top: 20px;
}

.section h5 {
    color: #38bdf8;
}

.btn-custom {
    background: linear-gradient(45deg, #3b82f6, #06b6d4);
    border: none;
    padding: 10px;
    font-weight: bold;
    border-radius: 10px;
    color: white;
}

.result-box {
    margin-top: 20px;
    padding: 15px;
    background: #22c55e;
    border-radius: 10px;
    text-align: center;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container-box">
<div class="card">

<h2 class="text-center">🚀 Credit Risk Prediction</h2>

<form method="POST">

<div class="section">
<h5>🏠 Home Ownership</h5>
<input name="f1" class="form-control mb-2" placeholder="Mortgage (0 or 1)">
<input name="f2" class="form-control mb-2" placeholder="Other (0 or 1)">
<input name="f3" class="form-control mb-2" placeholder="Own (0 or 1)">
<input name="f4" class="form-control mb-2" placeholder="Rent (0 or 1)">
</div>

<div class="section">
<h5>📌 Loan Intent</h5>
<input name="f5" class="form-control mb-2" placeholder="Debt Consolidation (0 or 1)">
<input name="f6" class="form-control mb-2" placeholder="Education (0 or 1)">
<input name="f7" class="form-control mb-2" placeholder="Home Improvement (0 or 1)">
<input name="f8" class="form-control mb-2" placeholder="Medical (0 or 1)">
<input name="f9" class="form-control mb-2" placeholder="Personal (0 or 1)">
<input name="f10" class="form-control mb-2" placeholder="Venture (0 or 1)">
</div>

<div class="section">
<h5>📊 Loan & Credit Info</h5>
<input name="f11" class="form-control mb-2" placeholder="Loan Grade (numeric)">
<input name="f12" class="form-control mb-2" placeholder="Default on File (0 or 1)">
<input name="f13" class="form-control mb-2" placeholder="Employment Length (years)">
<input name="f14" class="form-control mb-2" placeholder="Loan Percent Income">
<input name="f15" class="form-control mb-2" placeholder="Credit History Length">
</div>

<div class="section">
<h5>👤 Personal Info</h5>
<input name="f16" class="form-control mb-2" placeholder="Age">
<input name="f17" class="form-control mb-2" placeholder="Income">
<input name="f18" class="form-control mb-2" placeholder="Loan Amount">
<input name="f19" class="form-control mb-2" placeholder="Interest Rate">
</div>

<button class="btn-custom w-100 mt-3">Predict</button>

</form>

{% if result is not none %}
<div class="result-box">
Prediction Result: {{ result }}
</div>
{% endif %}

</div>
</div>

</body>
</html>
