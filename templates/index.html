<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ML Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .card {
            background: #1e293b;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }

        .form-control {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .btn-custom {
            background: linear-gradient(45deg, #3b82f6, #06b6d4);
            border: none;
            color: white;
            font-weight: bold;
        }

        .btn-custom:hover {
            background: linear-gradient(45deg, #2563eb, #0891b2);
        }

        .result-box {
            background: #0ea5e9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        h2 {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card p-4">

        <h2 class="text-center">🚀 ML Prediction Dashboard</h2>

        <form method="POST" class="mt-4">

            <!-- 🔥 CHANGE INPUT COUNT BASED ON YOUR MODEL -->
            <input type="text" name="a" class="form-control mb-3" placeholder="Enter Feature 1">
            <input type="text" name="b" class="form-control mb-3" placeholder="Enter Feature 2">
            <input type="text" name="c" class="form-control mb-3" placeholder="Enter Feature 3">

            <button class="btn btn-custom w-100">Predict</button>
        </form>

        {% if result is not none %}
        <div class="result-box">
            <h4>Prediction: {{ result }}</h4>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
